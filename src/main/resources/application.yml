server:
  port: 8080

spring:
  application:
    name: healthcard
  datasource:
    url: jdbc:postgresql://localhost:5432/ibdihealthscoredb
    username: postgres
    password: 7539
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
