version: '3.8'

services:
  db:
    image: postgres:15
    container_name: healthcard-db
    environment:
      POSTGRES_DB: ibdihealthscoredb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 7539
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ibdihealthscoredb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: healthcard-app
    ports:
      - "8080:8080"
    environment:
      # Overriding properties from application.yml to point to the db container
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ibdihealthscoredb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=7539
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
